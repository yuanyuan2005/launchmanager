<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LaunchHub</title>
    <style>
      /* 防止闪烁的白屏 */
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #f8f9fa;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      }

      /* 启动遮罩：窗口 show 时立即展示，与背景色一致，消除黑屏 */
      #app-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #f8f9fa;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        transition: opacity 0.4s ease;
      }

      #app-splash.is-hidden {
        opacity: 0;
        pointer-events: none;
      }

      #app-splash .splash-logo {
        width: 48px;
        height: 48px;
        border-radius: 12px;
        background: linear-gradient(135deg, #3b82f6, #2563eb);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-size: 22px;
        font-weight: 700;
        margin-bottom: 12px;
        box-shadow: 0 4px 16px rgba(59, 130, 246, 0.35);
      }

      #app-splash .splash-text {
        color: #9ca3af;
        font-size: 13px;
        letter-spacing: 0.5px;
      }
    </style>
  </head>
  <body>
    <!-- 启动遮罩：与 background 同色，窗口显示瞬间即覆盖，无黑屏 -->
    <div id="app-splash">
      <div class="splash-logo">L</div>
      <div class="splash-text">LaunchHub</div>
    </div>

    <div id="app"></div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
